<svg width="490" height="490" fill="none" xmlns="http://www.w3.org/2000/svg" viewBox="138 115 214 245">
  <!-- Braava Jet 240 - Top-down view, grey lines + turquoise button -->

  <!-- Main body -->
  <rect x="145" y="120" width="200" height="230" rx="45" ry="45"
        fill="none" stroke="#999" stroke-width="2"/>

  <!-- Inner seam line -->
  <rect x="155" y="130" width="180" height="210" rx="38" ry="38"
        fill="none" stroke="#ccc" stroke-width="1"/>

  <!-- Top panel lines -->
  <path d="M190 145 L300 145" stroke="#bbb" stroke-width="1"/>
  <path d="M185 160 L305 160" stroke="#ccc" stroke-width="0.8"/>

  <!-- CLEAN button - outer ring (darker turquoise) -->
  <circle cx="245" cy="230" r="32" fill="#2ec4b6" stroke="#1a9e92" stroke-width="2"/>
  <!-- Inner ring (darker turquoise stroke, white fill) -->
  <circle cx="245" cy="230" r="26" fill="white" stroke="#1a9e92" stroke-width="1.2"/>

  <!-- CLEAN text (turquoise) -->
  <text x="245" y="226" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="8" font-weight="700" fill="#1a9e92" letter-spacing="1.8">CLEAN</text>

  <!-- Power symbol (turquoise) -->
  <path d="M238 237 A9 9 0 1 0 252 237"
        fill="none" stroke="#1a9e92" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="245" y1="233" x2="245" y2="240"
        stroke="#1a9e92" stroke-width="1.4" stroke-linecap="round"/>

  <!-- iROBOT label -->
  <text x="245" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="9" font-weight="600" fill="#aaa" letter-spacing="2">iROBOT</text>

  <!-- BRAAVA JET label -->
  <text x="245" y="285" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="8" font-weight="500" fill="#bbb" letter-spacing="2.5">BRAAVA JET</text>

  <!-- 240 label -->
  <text x="245" y="298" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="7" fill="#ccc" letter-spacing="1.5">240</text>

  <!-- Bottom cleaning pad -->
  <path d="M185 335 Q185 350 245 350 Q305 350 305 335"
        fill="none" stroke="#bbb" stroke-width="1.2"/>
  <line x1="205" y1="341" x2="285" y2="341" stroke="#ddd" stroke-width="0.8"/>
  <line x1="210" y1="345" x2="280" y2="345" stroke="#ddd" stroke-width="0.8"/>

  <!-- Wheel wells -->
  <ellipse cx="153" cy="230" rx="5" ry="18" fill="none" stroke="#bbb" stroke-width="1.2"/>
  <ellipse cx="337" cy="230" rx="5" ry="18" fill="none" stroke="#bbb" stroke-width="1.2"/>

  <!-- Rear bumper -->
  <path d="M190 340 Q245 355 300 340" fill="none" stroke="#ccc" stroke-width="0.8"/>

  <!-- LED indicator -->
  <circle cx="245" cy="133" r="3" fill="none" stroke="#bbb" stroke-width="1"/>

  <!-- Corner seams -->
  <path d="M165 170 Q160 170 158 175" fill="none" stroke="#ddd" stroke-width="0.7"/>
  <path d="M325 170 Q330 170 332 175" fill="none" stroke="#ddd" stroke-width="0.7"/>
  <path d="M165 305 Q160 305 158 300" fill="none" stroke="#ddd" stroke-width="0.7"/>
  <path d="M325 305 Q330 305 332 300" fill="none" stroke="#ddd" stroke-width="0.7"/>
</svg>
